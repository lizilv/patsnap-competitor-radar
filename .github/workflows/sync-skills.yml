name: Sync PatSnap SkillHub
on:
  schedule:
    - cron: "20 */12 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/sync-skills.yml"
      - "scripts/sync-skills.mjs"
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-save playwright
      - run: npx playwright install --with-deps chromium
      - run: node scripts/sync-skills.mjs
      - name: Commit changes
        run: |
          git config user.name "skillhub-sync"
          git config user.email "actions@users.noreply.github.com"
          git add data/skills.json
          git diff --cached --quiet || git commit -m "chore: sync PatSnap SkillHub"
          git push
